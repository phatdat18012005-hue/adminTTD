<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f6fa;
        }

        .sidebar {
            height: 100vh;
            background: #2f3640;
            color: white;
            padding: 20px;
        }

            .sidebar h4 {
                text-align: center;
            }

            .sidebar a {
                display: block;
                color: white;
                padding: 10px;
                text-decoration: none;
                border-radius: 8px;
                margin-bottom: 10px;
                transition: 0.3s;
            }

                .sidebar a:hover {
                    background: #40739e;
                }

        .card {
            border-radius: 15px;
            transition: 0.3s;
        }

            .card:hover {
                transform: scale(1.05);
            }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row">

            <!-- Sidebar -->
            <div class="col-2 sidebar">
                <h4>ADMIN</h4>
                <a href="#">Dashboard</a>
                <a href="baiviet.html">Bài viết</a>
                <a href="#">Người dùng</a>
                <a href="#">Dịch vụ</a>
            </div>

            <!-- Content -->
            <div class="col-10 p-4">
                <h2>Dashboard</h2>

                <div class="row mt-4">
                    <div class="col-md-3">
                        <div class="card p-3 text-center bg-primary text-white">
                            <h4 id="tongBai">0</h4>
                            <p>Bài viết</p>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card p-3 text-center bg-success text-white">
                            <h4>120</h4>
                            <p>Người dùng</p>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card p-3 text-center bg-warning text-white">
                            <h4>30</h4>
                            <p>Dịch vụ</p>
                        </div>
                    </div>
                </div>

            </div>

        </div>
    </div>

    <script>
fetch("https://localhost:7047/api/BaiViet")
.then(res => res.json())
.then(data => {
    document.getElementById("tongBai").innerText = data.length;
});
    </script>

</body>
</html>
