<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý bài viết</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

    <h2>Quản lý bài viết</h2>

    <button class="btn btn-primary mb-3" onclick="them()">+ Thêm</button>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Tiêu đề</th>
                <th>Trạng thái</th>
                <th>Hành động</th>
            </tr>
        </thead>

        <tbody id="data"></tbody>
    </table>

    <script>
function load() {
    fetch("https://localhost:7047/api/BaiViet")
    .then(res => res.json())
    .then(data => {
        let html = "";
        data.forEach(x => {
            html += `
            <tr>
                <td>${x.id}</td>
                <td>${x.tieuDe}</td>
                <td>${x.trangThai}</td>
                <td>
                    <button class="btn btn-danger" onclick="xoa(${x.id})">Xoá</button>
                </td>
            </tr>`;
        });
        document.getElementById("data").innerHTML = html;
    });
}

function them() {
    fetch("https://localhost:7047/api/BaiViet", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            tieuDe: "Bài mới",
            noiDung: "Nội dung demo",
            trangThai: "Đăng"
        })
    }).then(load);
}

function xoa(id) {
    fetch("https://localhost:7047/api/BaiViet/" + id, {
        method: "DELETE"
    }).then(load);
}

load();
    </script>

</body>
</html>
